# Parâmetros Nav2 — variante para Raspberry Pi 4 4GB.
#
# Mantém a estrutura do nav2_params.yaml (notebook), com os seguintes ajustes
# pra caber no Cortex-A72 quad-core sem estourar a CPU:
#
#   1) AMCL: max_particles 2000 → 800; min_particles 500 → 200.
#      Reduz drasticamente o custo do likelihood field (~O(n_particles)).
#
#   2) local_costmap: VoxelLayer → ObstacleLayer.
#      Sem câmera RGB-D, o eixo Z do voxel é desperdício puro. ObstacleLayer
#      é ~3× mais barato em CPU pro mesmo resultado com LiDAR 2D.
#
#   3) DWB: vx_samples 20 → 12, vtheta_samples 20 → 12, sim_time 1.5 → 1.2.
#      Menos trajetórias avaliadas por ciclo — comportamento praticamente
#      igual em ambiente sem obstáculos densos, ganho grande em CPU.
#
#   4) costmaps: publish_frequency reduzido (UI não precisa de 2 Hz).
#      always_send_full_costmap: false — só publica diffs.
#
# Tudo o que NÃO está documentado nessa lista é idêntico ao nav2_params.yaml.
# Razão: preservamos o tuning de comportamento já calibrado (BaseObstacle,
# Oscillation, GoalAlign etc.) — só cortamos custo computacional.

amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: "scan"
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    # PI: reduzido pra caber na CPU sem perder convergência em ambiente pequeno.
    min_particles: 200
    max_particles: 800
    laser_max_range: 12.0
    laser_min_range: 0.1
    laser_model_type: "likelihood_field"
    max_beams: 60
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    tf_broadcast: true
    # Alinhado com DWB e behaviors em 0.5 — antes AMCL=1.0 e DWB=0.2,
    # com erros transientes de TF quando AMCL atualizava map→odom devagar.
    transform_tolerance: 0.5
    update_min_a: 0.2
    update_min_d: 0.25
    resample_interval: 1
    do_beamskip: true
    beam_skip_distance: 0.5
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.30
      use_astar: true
      allow_unknown: true

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    # diff-drive tem vy=0 sempre, então o threshold em y é inócuo — default 0.001.
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 15.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.40
      yaw_goal_tolerance: 0.35
      stateful: true
    FollowPath:
      # 2026-06-03 (curvas/giro): DWB sozinho NÃO comita giro acentuado nem
      # point-turn — os critics de progresso (PathDist/GoalDist) premiam ir reto,
      # então o robô só faz curvinhas. Envelopamos o DWB no RotationShimController:
      # quando o caminho aponta > angular_dist_threshold do yaw atual, ele gira no
      # LUGAR (forte) até alinhar e SÓ ENTÃO entrega pro DWB seguir o caminho.
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "dwb_core::DWBLocalPlanner"
      angular_dist_threshold: 0.785       # 45° — acima disso, gira no lugar antes
      forward_sampling_distance: 0.5      # ponto do caminho p/ medir o heading-alvo
      # 6.0 rad/s CASA com o manual (teleop_ps4.yaml scale_angular=6.0,
      # BASE_ANGULAR_SPEED=6.0). Este chassi 4 rodas só vence a patinagem a ~6.0:
      # via cmd_vel_to_wheels (±100·ω) isso é ±600 unid/roda; abaixo disso as rodas
      # patinam e o robô NÃO gira. Era a causa raiz do "não vira" (nav2 ia até 2.5
      # = ±250, fraco demais).
      rotate_to_heading_angular_vel: 6.0
      max_angular_accel: 7.0
      rotate_to_goal_heading: true        # também gira p/ encarar o yaw final do goal
      simulate_ahead_time: 1.0
      # ---- DWBLocalPlanner (primary_controller, params herdados deste bloco) ----
      debug_trajectory_details: false
      min_vel_x: -0.1
      max_vel_x: 0.35
      min_vel_y: 0.0
      max_vel_y: 0.0
      # 2.5 → 6.0: idem ao shim — o chassi precisa de ~6.0 p/ rotacionar de fato.
      # Dá ao DWB autoridade angular pra curvas em movimento (o smoother também
      # foi subido p/ 6.0, senão corta aqui).
      max_vel_theta: 6.0
      min_speed_xy: 0.0
      max_speed_xy: 0.35
      min_speed_theta: 0.0
      acc_lim_x: 1.0
      acc_lim_theta: 7.0
      decel_lim_x: -1.0
      decel_lim_theta: -7.0
      # PI: 20 → 12 samples por eixo. CPU do DWB cai linearmente, e o resultado
      # é idêntico em rota livre (a granularidade fina só importa em manobra
      # apertada — e mesmo aí 12×12=144 trajetórias é mais que suficiente).
      vx_samples: 12
      vy_samples: 1
      vtheta_samples: 12
      # PI: sim_time 1.5 → 1.2. Cada trajetória integrada por 1.2 s em vez
      # de 1.5 s. Olha menos pra frente; com nossa v_max baixa (0.35 m/s)
      # 1.2 s já cobre 42 cm — suficiente pra escolher.
      sim_time: 1.2
      linear_granularity: 0.05
      angular_granularity: 0.025
      # Alinhado com AMCL/behaviors em 0.5 — ver comentário em AMCL.
      transform_tolerance: 0.5
      xy_goal_tolerance: 0.07
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: true
      limit_vel_cmd_in_traj: false
      stateful: true
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.15
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 32.0
      GoalAlign.forward_point_distance: 0.15
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 2.0
      RotateToGoal.lookahead_time: -1.0
      Oscillation.scale: 0.1

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      # PI: 2.0 → 1.0 Hz. UI/RViz consomem; 1 Hz é mais que suficiente pra
      # visualização e elimina metade do trabalho de serialização.
      publish_frequency: 1.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      footprint: "[[0.25, 0.25], [0.25, -0.25], [-0.25, -0.25], [-0.25, 0.25]]"
      # PI: VoxelLayer → ObstacleLayer. Sem câmera RGB-D, o tracking 3D é
      # custo morto. ObstacleLayer é ~3× mais leve mantendo idêntico
      # comportamento com LiDAR 2D.
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          max_obstacle_height: 2.0
          # LiDAR-only: todos os pontos vêm na altura do laser (~0.21 m).
          # Antes era -0.05 (filtro de chão da câmera RGB-D removida).
          min_obstacle_height: 0.0
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.5
        inflation_radius: 0.25
      # PI: false → só publica diffs. Reduz bandwidth pro web bridge.
      always_send_full_costmap: false

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      footprint: "[[0.25, 0.25], [0.25, -0.25], [-0.25, -0.25], [-0.25, 0.25]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          obstacle_max_range: 2.5
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.5
        inflation_radius: 0.25
      # PI: false — diffs em vez do mapa inteiro.
      always_send_full_costmap: false

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 1500

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: odom
    robot_base_frame: base_link
    # Alinhado com AMCL/DWB em 0.5 — ver comentário em AMCL.
    transform_tolerance: 0.5
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.8
    min_rotational_vel: 0.2
    rotational_acc_lim: 2.0

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    # PI: 20 → 15 Hz. Smoother não precisa rodar mais rápido que o controller
    # (10 Hz). 15 Hz dá uma folga e libera ~25% do custo do nó.
    smoothing_frequency: 15.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    # theta 0.8 → 2.5 (casa com FollowPath.max_vel_theta; senão o smoother
    # corta o giro do controller em 0.8). Ver docs/NAV2_GIRO_2026-06-03.md.
    max_velocity: [0.35, 0.0, 2.5]
    # Ré alinhada com o DWB (min_vel_x: -0.1) — antes -0.15 deixava o smoother
    # permitir mais ré do que o planejador sabe gerar.
    min_velocity: [-0.1, 0.0, -2.5]
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
    max_accel: [1.0, 0.0, 3.5]
    max_decel: [-1.0, 0.0, -3.5]
    odom_topic: "odom"
    odom_duration: 0.1
