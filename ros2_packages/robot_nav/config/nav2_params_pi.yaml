# Parâmetros Nav2 — variante para Raspberry Pi 4 4GB.
#
# Mantém a estrutura do nav2_params.yaml (notebook), com os seguintes ajustes
# pra caber no Cortex-A72 quad-core sem estourar a CPU:
#
#   1) AMCL: max_particles 2000 → 800; min_particles 500 → 200.
#      Reduz drasticamente o custo do likelihood field (~O(n_particles)).
#
#   2) local_costmap: VoxelLayer → ObstacleLayer.
#      Sem câmera RGB-D, o eixo Z do voxel é desperdício puro. ObstacleLayer
#      é ~3× mais barato em CPU pro mesmo resultado com LiDAR 2D.
#
#   3) DWB: vx_samples 20 → 12, vtheta_samples 20 → 12, sim_time 1.5 → 1.2.
#      Menos trajetórias avaliadas por ciclo — comportamento praticamente
#      igual em ambiente sem obstáculos densos, ganho grande em CPU.
#
#   4) costmaps: publish_frequency reduzido (UI não precisa de 2 Hz).
#      always_send_full_costmap: false — só publica diffs.
#
# Tudo o que NÃO está documentado nessa lista é idêntico ao nav2_params.yaml.
# Razão: preservamos o tuning de comportamento já calibrado (BaseObstacle,
# Oscillation, GoalAlign etc.) — só cortamos custo computacional.

amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: "scan"
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    # PI: reduzido pra caber na CPU sem perder convergência em ambiente pequeno.
    min_particles: 200
    max_particles: 800
    laser_max_range: 12.0
    laser_min_range: 0.1
    laser_model_type: "likelihood_field"
    max_beams: 60
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    tf_broadcast: true
    # Alinhado com DWB e behaviors em 0.5 — antes AMCL=1.0 e DWB=0.2,
    # com erros transientes de TF quando AMCL atualizava map→odom devagar.
    transform_tolerance: 0.5
    update_min_a: 0.2
    update_min_d: 0.25
    resample_interval: 1
    do_beamskip: true
    beam_skip_distance: 0.5
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.30
      use_astar: true
      allow_unknown: true

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    # diff-drive tem vy=0 sempre, então o threshold em y é inócuo — default 0.001.
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 15.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.40
      yaw_goal_tolerance: 0.35
      stateful: true
    FollowPath:
      # 2026-06-08: TROCADO DWB+RotationShim → Regulated Pure Pursuit (RPP).
      # POR QUÊ: o DWB é um otimizador de trajetória que PREMIA IR RETO e corta
      # caminho — mesmo com a linha mandando virar, ele ia reto pro goal e batia
      # (BaseObstacle.scale 0.15 mal pesava obstáculo). O RPP PERSEGUE um ponto
      # SOBRE a linha planejada (não corta pro goal), gira no lugar ANTES quando o
      # caminho aponta torto, freia em curva/perto de obstáculo, e é leve na Pi.
      # Substitui também o RotationShim (rotate_to_heading é nativo do RPP).
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.35
      # Lookahead = ponto-alvo na linha. Curto segue mais colado (vira mais cedo,
      # corta menos quina); escala com a velocidade (0.3 parado → 0.9 rápido).
      lookahead_dist: 0.5
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: true
      # ---- giro no lugar (point-turn) p/ seguir a linha de cara ----
      use_rotate_to_heading: true
      # Caminho mais torto que ~29° → para e gira no lugar ANTES de andar.
      rotate_to_heading_min_angle: 0.50
      # Chassi 4 rodas só vence a patinagem do giro a ~6.0 rad/s (=±600 na
      # cmd_vel_to_wheels). Mesmo número do manual e do antigo RotationShim.
      rotate_to_heading_angular_vel: 6.0
      # ALTO de propósito: o RPP limita o giro pela velocidade MEDIDA (mesmo risco
      # do closed_loop do shim — roda patina, odom lê ~0, travaria em ±100). Com
      # max_angular_accel alto o RPP já COMANDA 6.0 de cara; quem faz a rampa
      # segura é o velocity_smoother (OPEN_LOOP, max_accel angular 10) → sobe
      # 0→6 sem depender da medida. Sem isso, não giraria (vide NAV2_GIRO).
      max_angular_accel: 64.0
      allow_reversing: false
      # ---- anti-colisão: não bate ----
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      # ---- regula a velocidade: cai em curva fechada e ao chegar no goal ----
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      max_robot_pose_search_dist: 10.0
      use_interpolation: true
      transform_tolerance: 0.5

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      # PI: 2.0 → 1.0 Hz. UI/RViz consomem; 1 Hz é mais que suficiente pra
      # visualização e elimina metade do trabalho de serialização.
      publish_frequency: 1.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      footprint: "[[0.25, 0.25], [0.25, -0.25], [-0.25, -0.25], [-0.25, 0.25]]"
      # PI: VoxelLayer → ObstacleLayer. Sem câmera RGB-D, o tracking 3D é
      # custo morto. ObstacleLayer é ~3× mais leve mantendo idêntico
      # comportamento com LiDAR 2D.
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          max_obstacle_height: 2.0
          # LiDAR-only: todos os pontos vêm na altura do laser (~0.21 m).
          # Antes era -0.05 (filtro de chão da câmera RGB-D removida).
          min_obstacle_height: 0.0
          # 2026-06-08: revertido 1.0 → 0.0 (estava medroso — segurava obstáculo
          # fantasma por 1 s e bloqueava a rota). Trade-off: perna fina de cadeira
          # pode piscar no costmap; aceitável pra não travar a navegação.
          observation_persistence: 0.0
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # 2026-06-08: revertido p/ 0.25 / 3.5 (estava 0.45 / 2.5 = medroso —
        # inflava demais e tornava ponto perto de parede inalcançável → o planner
        # falhava "Failed to create plan" e o robô desistia). Risco de raspar a
        # quina volta; aceitável pra não travar a navegação.
        cost_scaling_factor: 3.5
        inflation_radius: 0.25
      # PI: false → só publica diffs. Reduz bandwidth pro web bridge.
      always_send_full_costmap: false

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      footprint: "[[0.25, 0.25], [0.25, -0.25], [-0.25, -0.25], [-0.25, 0.25]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          # 2026-06-08: revertido 1.0 → 0.0 (idem ao local — estava medroso).
          observation_persistence: 0.0
          raytrace_max_range: 3.0
          obstacle_max_range: 2.5
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # 2026-06-08: revertido p/ 0.25 / 3.5 (estava 0.45 / 2.5 = medroso —
        # inflava demais e tornava ponto perto de parede inalcançável → o planner
        # falhava "Failed to create plan" e o robô desistia). Risco de raspar a
        # quina volta; aceitável pra não travar a navegação.
        cost_scaling_factor: 3.5
        inflation_radius: 0.25
      # PI: false — diffs em vez do mapa inteiro.
      always_send_full_costmap: false

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    # PI (2026-06-08): 20 → 200 ms. É o tempo que o BT espera o action server só
    # ACEITAR (ack) o pedido. Medido na bancada: com SLAM localizando, o nav2
    # replaneja a ~1 Hz e o pedido compute_path_to_pose estourava 20 ms na Pi sob
    # carga (AMCL + 2 costmaps + DWB + smoother + collision_monitor) → "Timed out
    # while waiting for action server to acknowledge goal request" → Goal failed
    # ("girou um pouco e desistiu"). 200 ms dá folga p/ o planner_server aceitar
    # sem largar a navegação. NÃO é o tempo de planejar (esse é outro) — só o ack.
    default_server_timeout: 200

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 1500

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: odom
    robot_base_frame: base_link
    # Alinhado com AMCL/DWB em 0.5 — ver comentário em AMCL.
    transform_tolerance: 0.5
    simulate_ahead_time: 2.0
    max_rotational_vel: 6.0
    min_rotational_vel: 1.0
    rotational_acc_lim: 10.0

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    # PI: 20 → 15 Hz. Smoother não precisa rodar mais rápido que o controller
    # (10 Hz). 15 Hz dá uma folga e libera ~25% do custo do nó.
    smoothing_frequency: 15.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    # theta 0.8 → 2.5 (casa com FollowPath.max_vel_theta; senão o smoother
    # corta o giro do controller em 0.8). Ver docs/NAV2_GIRO_2026-06-03.md.
    # 2026-06-08: linear revertido 0.25 → 0.35 (casa com DWB max_vel_x; estava
    # medroso). Angular 6.0 (necessário p/ vencer a patinagem do giro).
    max_velocity: [0.35, 0.0, 6.0]
    # Ré alinhada com o DWB (min_vel_x: -0.1) — antes -0.15 deixava o smoother
    # permitir mais ré do que o planejador sabe gerar.
    min_velocity: [-0.1, 0.0, -6.0]
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
    max_accel: [1.0, 0.0, 10.0]
    max_decel: [-1.0, 0.0, -10.0]
    odom_topic: "odom"
    odom_duration: 0.1

# Collision Monitor (MEDROSO 2026-06-05) — reflexo de segurança de última linha.
# Lê o /scan CRU (independe de pose/costmap/planner) e freia o cmd_vel ANTES
# de chegar nos motores. É o que garante "nunca bater": mesmo que o costmap
# tenha perdido a perna fina da cadeira, se QUALQUER ponto do laser entra na
# zona, ele para. Fica no pipeline ENTRE o velocity_smoother e o twist_mux:
#   controller -> cmd_vel_nav -> smoother -> nav_vel_raw -> [collision_monitor]
#                 -> nav_vel -> twist_mux(prio 10) -> cmd_vel -> rodas
# Como só filtra o ramo nav_vel, o PS4/web (prioridade maior no mux) seguem
# mandando por cima — o humano no controle continua soberano.
collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "nav_vel_raw"
    cmd_vel_out_topic: "nav_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.5
    # Scan do LD06 é ~10 Hz; 1 s = 10 scans de tolerância antes de considerar
    # o sensor "mudo". base_shift_correction reposiciona os pontos pelo TF
    # odom->base_link entre o instante do scan e agora (corrige o movimento).
    source_timeout: 1.0
    base_shift_correction: True
    stop_pub_timeout: 2.0
    # 2026-06-08: ENFRAQUECIDO a pedido. Só PolygonStop (a PolygonSlow rastejava
    # a 30% perto de tudo = medroso). Agora é só um reflexo de parada de última
    # hora, apertado e com min_points alto pra não disparar por ruído do LiDAR.
    polygons: ["PolygonStop"]
    # Zona de DESACELERAÇÃO: ~40 cm além da borda do robô. Entrou algo aqui,
    # cai pra 30% da velocidade -> aproximação mansa, mais tempo de reagir.
    PolygonSlow:
      type: "polygon"
      points: "[[0.65, 0.45], [0.65, -0.45], [-0.45, -0.45], [-0.45, 0.45]]"
      action_type: "slowdown"
      slowdown_ratio: 0.3
      # min_points BAIXO (2) de propósito: perna fina de cadeira a ~1 m devolve
      # só 1–2 feixes. 2 pontos já dispara. Falso-positivo aqui só desacelera
      # (seguro). Um humano devolve muitos pontos, sempre pega.
      min_points: 2
      visualize: True
      polygon_pub_topic: "polygon_slowdown"
      enabled: True
    # Zona de PARADA: ~12 cm além da borda do robô (footprint ±0.25). Qualquer
    # coisa aqui -> para. Margem antes do contato real.
    PolygonStop:
      type: "polygon"
      # 2026-06-08: apertado (~7 cm além do footprint ±0.25, era ~12) e min_points
      # 2 → 5: só para por objeto sólido bem próximo, não por 2 feixes de ruído.
      points: "[[0.32, 0.30], [0.32, -0.30], [-0.32, -0.30], [-0.32, 0.30]]"
      action_type: "stop"
      min_points: 5
      visualize: True
      polygon_pub_topic: "polygon_stop"
      enabled: True
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "scan"
      enabled: True
