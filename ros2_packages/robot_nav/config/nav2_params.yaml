# Parâmetros Nav2 para o robô hoverboard diferencial.
# Stack: map_server + amcl + planner + controller + bt_navigator +
#        waypoint_follower + behavior_server + velocity_smoother.
# Entrada: /scan (LiDAR LD20), /odom (odom_publisher), TF odom->base_link.
# Saída de comando: /cmd_vel (direto, sem filtro intermediário).

amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: "scan"
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    min_particles: 500
    max_particles: 2000
    laser_max_range: 12.0
    laser_min_range: 0.1
    laser_model_type: "likelihood_field"
    max_beams: 60
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    tf_broadcast: true
    # Alinhado com DWB e behaviors em 0.5 — antes AMCL=1.0 e DWB=0.2,
    # com errros transientes de TF quando AMCL atualizava map→odom devagar.
    transform_tolerance: 0.5
    update_min_a: 0.2
    update_min_d: 0.25
    resample_interval: 1
    # Beam skip: quando um feixe bate num obstáculo que não está no mapa
    # (cadeira nova, pessoa, mochila no chão), o AMCL ignora esse feixe em
    # vez de penalizar as partículas que estariam corretas. Essencial pra
    # ambiente dinâmico como sala de aula. Sem isso, ~30% dos feixes batendo
    # em coisas não mapeadas já era o bastante pra localização colapsar.
    do_beamskip: true
    beam_skip_distance: 0.5          # m — distância máx pra considerar o feixe como "match"
    beam_skip_threshold: 0.3         # fração de partículas que precisa concordar que é skip
    beam_skip_error_threshold: 0.9   # aborta o skip se o erro acumulado passar disso

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""   # definido via launch (-p yaml_filename:=...)

planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      # Se o ponto exato estiver bloqueado (cadeira encostada, pessoa parada),
      # o planner tenta achar um caminho até 30 cm do alvo em vez de falhar.
      tolerance: 0.30
      use_astar: true
      allow_unknown: true

controller_server:
  ros__parameters:
    use_sim_time: false
    # 10 Hz (default Nav2 é 20): limita o custo do DWB na Pi. Suficiente pro
    # nosso ambiente (obstáculos majoritariamente estáticos / lentos).
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    # diff-drive tem vy=0 sempre, então o threshold em y é inócuo — default 0.001.
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 15.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      # Folga pra ambiente dinâmico — se uma cadeira estiver atrapalhando
      # o ponto exato, robô considera que chegou a até 40 cm / ~20° do alvo.
      # Distinto do FollowPath.xy_goal_tolerance (0.07): este é o critério de
      # "cheguei no goal"; o do DWB é a tolerância interna de parada na trajetória.
      xy_goal_tolerance: 0.40
      yaw_goal_tolerance: 0.35
      stateful: true
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false
      # Permite ré pequena (-0.1 m/s) em navegação normal pra DWB ter como
      # opção em manobra apertada. Antes era 0.0 — só dava ré via BackUp
      # recovery, que só dispara após ~15 s de "travado" pelo progress
      # checker. Resultado: robô parava 15 s antes de fazer uma manobra
      # que precisaria de 1–2 s de ré pra ajeitar. Os critics PathAlign/
      # GoalAlign continuam preferindo frente em campo aberto, então a ré
      # só é escolhida quando realmente é a melhor opção.
      min_vel_x: -0.1
      max_vel_x: 0.35
      min_vel_y: 0.0
      max_vel_y: 0.0
      max_vel_theta: 0.8
      min_speed_xy: 0.0
      max_speed_xy: 0.35
      min_speed_theta: 0.0
      acc_lim_x: 1.0
      acc_lim_theta: 2.0
      decel_lim_x: -1.0
      decel_lim_theta: -2.0
      vx_samples: 20
      vy_samples: 1
      vtheta_samples: 20
      sim_time: 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.5
      xy_goal_tolerance: 0.07
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: true
      limit_vel_cmd_in_traj: false
      stateful: true
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      # 0.15 (era 0.02) faz o DWB pesar muito mais "fica longe de obstáculo"
      # ao escolher trajetória — sem mexer em geometria de costmap, que está
      # funcionando bem. Antes o peso era 1600× menor que PathDist (32) →
      # robô seguia a rota mesmo encostando. Agora é ~200× menor — ainda
      # segue rota, mas evita trajetórias que passem raspando.
      BaseObstacle.scale: 0.15
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 32.0
      GoalAlign.forward_point_distance: 0.15
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 2.0
      RotateToGoal.lookahead_time: -1.0
      # Oscillation default é 1.0 — pune mudanças de sinal de velocidade,
      # achando que oscilar = ruim. Em manobra apertada (frente-gira-frente)
      # essas alternâncias são LEGÍTIMAS e o critic vetava elas, deixando o
      # DWB sem opção viável → robô ficava parado "pensando" 2 min até o
      # cenário mudar sozinho. 0.1 mantém aversão a oscilar gratuitamente
      # em campo aberto, sem matar manobras necessárias.
      Oscillation.scale: 0.1

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      footprint: "[[0.25, 0.25], [0.25, -0.25], [-0.25, -0.25], [-0.25, 0.25]]"
      # VoxelLayer mantido (mais conservador que ObstacleLayer) mas com
      # apenas LaserScan como fonte — a câmera RGB-D foi removida do robô.
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: false
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 10
        unknown_threshold: 9
        mark_threshold: 0
        combination_method: 1
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          max_obstacle_height: 2.0
          # LiDAR-only: todos os pontos vêm na altura do laser (~0.21 m).
          # Antes era -0.05 (filtro de chão da câmera RGB-D removida).
          min_obstacle_height: 0.0
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.5
        inflation_radius: 0.25
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      footprint: "[[0.25, 0.25], [0.25, -0.25], [-0.25, -0.25], [-0.25, 0.25]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          obstacle_max_range: 2.5
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.5
        inflation_radius: 0.25
      always_send_full_costmap: true

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    # plugin_lib_names removido: no Nav2 Jazzy o bt_navigator já auto-registra
    # os BT nodes padrão. Declarar aqui causava "ID [ComputePathToPose] already
    # registered" → FATAL → process has died (exit -11).

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 1500

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.5
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.8
    min_rotational_vel: 0.2
    rotational_acc_lim: 2.0

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.35, 0.0, 0.8]
    # Ré alinhada com o DWB (min_vel_x: -0.1) — antes -0.15 deixava o smoother
    # permitir mais ré do que o planejador sabe gerar.
    min_velocity: [-0.1, 0.0, -0.8]
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
    max_accel: [1.0, 0.0, 2.0]
    max_decel: [-1.0, 0.0, -2.0]
    odom_topic: "odom"
    odom_duration: 0.1

# Collision Monitor (MEDROSO 2026-06-05) — reflexo de segurança de última linha.
# Lê o /scan CRU e freia o cmd_vel ANTES dos motores, independente de
# pose/costmap/planner. Fica entre o velocity_smoother e o twist_mux:
#   smoother -> nav_vel_raw -> [collision_monitor] -> nav_vel -> twist_mux.
# NOTA: este perfil (notebook/sim) está mais defasado que o nav2_params_pi.yaml,
# que é o que roda no robô. O bloco abaixo é igual ao da Pi pra a launch não
# quebrar quando rodada sem --pi.
collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "nav_vel_raw"
    cmd_vel_out_topic: "nav_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.5
    source_timeout: 1.0
    base_shift_correction: True
    stop_pub_timeout: 2.0
    polygons: ["PolygonSlow", "PolygonStop"]
    PolygonSlow:
      type: "polygon"
      points: "[[0.65, 0.45], [0.65, -0.45], [-0.45, -0.45], [-0.45, 0.45]]"
      action_type: "slowdown"
      slowdown_ratio: 0.3
      min_points: 2
      visualize: True
      polygon_pub_topic: "polygon_slowdown"
      enabled: True
    # 2026-06-15: PolygonStop estática -> "approach" (velocity-aware). Espelha o
    # nav2_params_pi.yaml (ver lá o comentário longo). Caixa fixa congelava ao
    # manobrar em sala estreita; approach projeta o footprint pela velocidade
    # comandada e só freia se a trajetória REAL colidir. Rollback: action_type
    # "stop" + points "[[0.37,0.32],[0.37,-0.32],[-0.35,-0.32],[-0.35,0.32]]".
    PolygonStop:
      type: "polygon"
      points: "[[0.25, 0.25], [0.25, -0.25], [-0.25, -0.25], [-0.25, 0.25]]"
      action_type: "approach"
      time_before_collision: 1.5
      simulation_time_step: 0.1
      min_points: 2
      visualize: True
      polygon_pub_topic: "polygon_stop"
      enabled: True
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "scan"
      enabled: True
