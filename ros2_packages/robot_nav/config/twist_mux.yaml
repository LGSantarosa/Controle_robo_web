# Arbitragem FINAL de /cmd_vel — twist_mux (PLANO_HEADLESS_2026-05-22, Fase 1).
#
# 2º estágio do pipeline de 2-mux (2026-06-26). As fontes autônomas (nav, seguidor,
# porta) NÃO entram mais aqui direto: elas são arbitradas no twist_mux_auto.yaml e
# passam pelo collision_monitor antes, chegando aqui como uma fonte só (auto_vel).
# Assim o collision protege TODA a autonomia num ponto só. O unstuck e o humano
# ficam AQUI, A JUSANTE do collision -> continuam furando o reflexo.
#
# Quem vence quando duas fontes mandam ao mesmo tempo: a de maior priority.
# Se uma fonte para de publicar por mais de `timeout` s, o mux a ignora e
# passa pra próxima. Saída: cmd_vel_out (remapeado pra cmd_vel no launch),
# consumido pelo cmd_vel_to_wheels.
#
#   PS4  (joy_vel, prio 100) — controle humano direto; sempre vence
#   WASD (key_vel, prio  90) — publicado por bin/robot-key em terminal SSH separado
#   web  (web_vel, prio  50) — só se WEB_TELEOP=on (controle_web/app.py)
#   unstuck (unstuck_vel, prio 30) — desencalhe; fura o collision (entra pós-collision)
#   autonomia (auto_vel, prio 10) — nav+seguidor+porta JÁ filtrados pelo collision
#
# Resolve o achado B20 da AUDITORIA_2026-05-18 (vários publishers direto no
# /cmd_vel). Sem locks ainda — sem botão de e-stop dedicado no protocolo.
twist_mux:
  ros__parameters:
    use_sim_time: false
    # No Jazzy o twist_mux default mudou pra geometry_msgs/TwistStamped. Nosso
    # teleop_twist_joy publica Twist (publish_stamped_twist: false no
    # teleop_ps4.yaml) e o cmd_vel_to_wheels subscreve Twist. Sem isso aqui o
    # DDS rejeita por type hash e /cmd_vel sai do mux mas ninguém consome.
    use_stamped: false
    topics:
      joystick:
        topic: joy_vel       # publicado por teleop_twist_joy (robot.launch.py)
        timeout: 0.5
        priority: 100
      keyboard:
        topic: key_vel       # publicado por bin/robot-key (SSH separado)
        timeout: 0.5
        priority: 90
      web:
        topic: web_vel       # publicado pelo controle_web quando WEB_TELEOP=on
        timeout: 0.5
        priority: 50
      unstuck:
        topic: unstuck_vel   # publicado pelo unstuck_supervisor (desencalhe)
        timeout: 0.5
        priority: 30         # fura o collision na ré/giro (entra pós-collision), < web/PS4
      autonomy:
        topic: auto_vel      # saída do collision_monitor (nav+seguidor+porta já arbitrados
                             # no twist_mux_auto e filtrados pelo reflexo de colisão)
        timeout: 0.5
        priority: 10
