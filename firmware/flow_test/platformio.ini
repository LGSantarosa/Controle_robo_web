; Teste ISOLADO do PMW3901 (sensor de fluxo optico) na Arduino MEGA.
; SEM anel, SEM hoverboard, SEM IMU, SEM protocolo — so' o sensor de fluxo.
; Objetivo: provar se o PMW3901 le' movimento do chao com a iluminacao nova
; (fita de 3 LEDs fixa na 12V), sem nenhuma outra variavel de software.
;
; LIGACOES (iguais ao firmware real):
;   MEGA 51 (MOSI) --> MOSI/SDIO do PMW3901
;   MEGA 50 (MISO) --> MISO do PMW3901
;   MEGA 52 (SCK)  --> SCK do PMW3901
;   MEGA 10 (CS)   --> CS/NCS do PMW3901
;   PMW3901 VIN --> 3V3   |   GND --> GND comum (junto do GND da MEGA)
;
; Upload (MEGA no Pi como /dev/ttyACM0):
;   pio run -t upload
;   pio device monitor -b 115200      # le' dx/dy/motion em texto
;
; Usa o MESMO fork local do driver (125 kHz/MODE0) do firmware real, via
; lib_extra_dirs — nao duplica codigo, mesmo timing de SPI.

[env:megaatmega2560]
platform       = atmelavr
board          = megaatmega2560
framework      = arduino
upload_speed   = 115200
monitor_speed  = 115200
lib_extra_dirs = ../mega_bridge/lib
build_flags    = -std=gnu++17 -Wall
