; Teste ISOLADO do anel WS2812 na Arduino MEGA.
; SEM sensores, SEM hoverboard, SEM protocolo — so' o anel.
; Objetivo: provar se a MEGA + pino 11 + anel acendem, sem nenhuma outra
; variavel de software (IMU/SPI/Serial) no caminho.
;
; Upload (MEGA conectada no Pi como /dev/ttyACM0):
;   pio run -t upload
;
; Se o anel ficar APAGADO ate' com este sketch minimo:
;   - troque DATA_PIN (linha no src/main.cpp) de 11 p/ 6 e regrave (testa se o
;     pino 11 da MEGA esta' morto), OU
;   - o problema e' fio/anel/contato no pino.

[env:megaatmega2560]
platform      = atmelavr
board         = megaatmega2560
framework     = arduino
upload_speed  = 115200
lib_deps      = fastled/FastLED@^3.7.0
build_flags   = -std=gnu++17 -Wall
