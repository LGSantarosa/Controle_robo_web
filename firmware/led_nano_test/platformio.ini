; Projeto DIAGNOSTICO — testa o anel WS2812 com um Arduino Nano no lugar da MEGA.
; Objetivo: isolar se o "lixo aleatorio" vem da MEGA ou do anel/fiacao/aterramento.
;
; Upload (Nano conectado por USB NESTE PC):
;   pio run -e nano_new -t upload     # Nano bootloader NOVO (clones recentes, 115200)
;   pio run -e nano_old -t upload     # Nano bootloader ANTIGO (muitos clones CH340, 57600)
; Tente nano_new primeiro; se travar em "Uploading...", use nano_old.
;
; Se der "permission denied" em /dev/ttyUSB0:
;   sudo usermod -aG dialout $USER   (depois faca logout/login)

[env]
framework   = arduino
platform    = atmelavr
lib_deps    = fastled/FastLED@^3.7.0
build_flags = -std=gnu++17 -Wall

[env:nano_new]
board        = nanoatmega328new
upload_speed = 115200

[env:nano_old]
board        = nanoatmega328
upload_speed = 57600
