; imu_diag — sketch de DIAGNÓSTICO de módulos MPU9250/9255/6500/6050 por I²C.
; É o "DIAG MAG (sketch de referencia)" do laudo PROVA_MPU6500_NAO_9250.md,
; agora versionado. Prova se o módulo tem magnetômetro AK8963 (9250 genuíno)
; ou não (6500 vendido como 9250).
;
; ⚠️ Flashear isto APAGA o mega_bridge da MEGA. Depois do teste, reflashear:
;   cd ../mega_bridge && pio run -t upload
;
; Uso (módulo no mesmo conector I²C da IMU do robô — SDA 20 / SCL 21 / 5V / GND):
;   pio run -t upload            # flasheia (MEGA no /dev/mega)
;   pio device monitor -b 115200 # assiste o veredito
; O sketch roda o teste em LOOP a cada ~3 s → troca de módulo SEM reflashear
; (desligar 5V antes de trocar o módulo é o certo).
;
; Fora do robô (MEGA avulsa no PC dev, sem o symlink /dev/mega):
;   pio run -t upload --upload-port /dev/ttyACM0

[env:megaatmega2560]
platform      = atmelavr
board         = megaatmega2560
framework     = arduino
monitor_speed = 115200
upload_speed  = 115200
; Mesmo motivo do mega_bridge: sem porta fixa o pio pode pegar o LiDAR.
upload_port   = /dev/mega
monitor_port  = /dev/mega

build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -Werror=return-type

; Nano/UNO avulso no PC dev (ATmega328P, optiboot 115200; I2C = A4 SDA / A5 SCL):
;   pio run -e nano -t upload --upload-port /dev/ttyUSB0
[env:nano]
platform      = atmelavr
board         = nanoatmega328new
framework     = arduino
monitor_speed = 115200
upload_speed  = 115200
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -Werror=return-type
