; Firmware da Arduino MEGA 2560 — ponte do PC para as duas placas de hoverboard
; e os sensores (BNO055 IMU, PMW3901 optical flow, relé, LED de marco, botão).
; (Anel WS2812 COMENTADO — ver AUDITORIA_2026-05-29 A1: leds.cpp fora do build.)
;
; Build/upload:
;   pio run                       # compila
;   pio run -t upload             # compila e flasheia (com a MEGA conectada por USB)
;   pio device monitor -b 230400  # monitor serial 230400 baud (USB MEGA <-> PC)
;
; Pinagem fixa — ver memória project_mega_pinout.md ou firmware/mega_bridge/include/*.h

[env:megaatmega2560]
platform      = atmelavr
board         = megaatmega2560
framework     = arduino
monitor_speed = 230400
upload_speed  = 115200

build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -Werror=return-type

; Anel WS2812 comentado (AUDITORIA_2026-05-29 A1): leds.cpp fica no repo pra
; eventual revival, mas FORA do build — assim a dep FastLED não é puxada e
; sobra flash/RAM na 2560. Pra reativar: remover o -<leds.cpp> e religar FastLED.
build_src_filter =
    +<*>
    -<leds.cpp>

lib_deps =
    adafruit/Adafruit BNO055@^1.6.4
    adafruit/Adafruit Unified Sensor@^1.1.14
    ; fastled/FastLED@^3.7.0   ; comentado — anel WS2812 fora do build (ver A1)
    ; Bitcraze PMW3901: usamos um FORK LOCAL em lib/Bitcraze_PMW3901/
    ; (125 kHz/MODE0 p/ o shifter desta placa). Por isso NÃO está aqui.
