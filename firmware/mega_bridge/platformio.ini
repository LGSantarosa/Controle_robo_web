; Firmware da Arduino MEGA 2560 — ponte do PC para as duas placas de hoverboard
; e os sensores (BNO055 IMU, PMW3901 optical flow, anel WS2812, relé, botão).
;
; Build/upload:
;   pio run                       # compila
;   pio run -t upload             # compila e flasheia (com a MEGA conectada por USB)
;   pio device monitor -b 230400  # monitor serial 230400 baud (USB MEGA <-> PC)
;
; Pinagem fixa — ver memória project_mega_pinout.md ou firmware/mega_bridge/include/*.h

[env:megaatmega2560]
platform      = atmelavr
board         = megaatmega2560
framework     = arduino
monitor_speed = 230400
upload_speed  = 115200

build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -Werror=return-type

lib_deps =
    adafruit/Adafruit BNO055@^1.6.4
    adafruit/Adafruit Unified Sensor@^1.1.14
    fastled/FastLED@^3.7.0
    ; Bitcraze PMW3901: usamos um FORK LOCAL em lib/Bitcraze_PMW3901/
    ; (125 kHz/MODE0 p/ o shifter desta placa). Por isso NÃO está aqui.
